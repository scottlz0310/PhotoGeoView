name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm build

      - name: Generate icons
        run: pnpm generate:icons

      - name: Package (Windows)
        run: pnpm exec electron-builder --win nsis --publish never
        env:
          DEBUG: electron-builder,electron-builder:*

      - name: List output files
        run: Get-ChildItem -Path dist -Recurse
        shell: pwsh
        if: always()

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-unix:
    name: Build on ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_ext: dmg
          - os: ubuntu-latest
            platform: linux
            artifact_ext: AppImage

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm build

      - name: Generate icons
        run: pnpm generate:icons

      - name: Package and Publish
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            pnpm exec electron-builder --mac dmg --config.mac.identity=null --publish never
          else
            pnpm exec electron-builder --linux AppImage --publish never
          fi
        shell: bash
        env:
          DEBUG: electron-builder,electron-builder:*

      - name: List output files
        run: ls -R dist || echo "dist directory not found"
        if: always()

      - name: Upload artifacts (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.AppImage
            dist/*.AppImage.blockmap
            dist/*.yml
          if-no-files-found: error
