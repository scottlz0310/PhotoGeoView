name: Build

on:
  push:
    branches: [main, "claude/**"]
    # DEBUG: Temporarily disabled paths filter to trigger on all pushes
    # paths:
    #   - "package.json"
    #   - "electron.vite.config.ts"
    #   - "src/**"
    #   - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    # DEBUG: Temporarily disabled paths filter to trigger on all PRs
    # paths:
    #   - "package.json"
    #   - "electron.vite.config.ts"
    #   - "src/**"
    #   - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test

      - name: Build App
        run: pnpm build

      - name: Package App
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # macOS 未署名で作る
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pnpm exec electron-builder "--" "--win" "--publish" "never"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            pnpm exec electron-builder --mac --x64 --publish=never
          else
            pnpm exec electron-builder --linux --publish=never
          fi

      # 出力一覧を OS ごとに
      - name: List build output (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath dist -Recurse -Force -ErrorAction SilentlyContinue
          if (!(Test-Path -LiteralPath dist)) { Write-Host "dist directory not found" }

      - name: List build output (*nix)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          ls -lahR dist || echo "dist directory not found"

      # アップロードは dist を継続利用
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PhotoGeoView-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: error

  build-windows-docker:
    name: Build Windows Installer (Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --progress=plain -t photogeoview-builder .

      - name: Run build in Docker
        id: docker-build
        run: |
          docker run --name photogeoview-build photogeoview-builder 2>&1 | tee docker-build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Show Docker logs on failure
        if: failure() || steps.docker-build.outputs.exit_code != '0'
        run: |
          echo "=== Docker build log ==="
          cat docker-build.log || true
          echo "=== Docker container logs ==="
          docker logs photogeoview-build 2>&1 || true

      - name: Extract build artifacts
        run: |
          docker cp photogeoview-build:/app/dist ./dist || {
            echo "Failed to extract artifacts. Checking container state..."
            docker inspect photogeoview-build || true
            exit 1
          }

      - name: Clean up container
        if: always()
        run: docker rm photogeoview-build || true

      - name: List output files
        run: ls -laR dist || echo "dist directory not found"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v6
        with:
          name: PhotoGeoView-windows-docker
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: error
