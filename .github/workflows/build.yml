name: Build

on:
  push:
    branches: [main]
    # DEBUG: Temporarily disabled paths filter to trigger on all pushes
    # paths:
    #   - "package.json"
    #   - "electron.vite.config.ts"
    #   - "src/**"
    #   - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    # DEBUG: Temporarily disabled paths filter to trigger on all PRs
    # paths:
    #   - "package.json"
    #   - "electron.vite.config.ts"
    #   - "src/**"
    #   - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test

      - name: Build App
        run: pnpm build

      - name: Package App
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # macOS 未署名で作る
          DEBUG: electron-builder
        run: |
          # Use npx to run electron-builder directly
          if [ "$RUNNER_OS" = "Windows" ]; then
            npx electron-builder --win --publish never
          elif [ "$RUNNER_OS" = "macOS" ]; then
            npx electron-builder --mac --publish never
          else
            pnpm package:appimage
          fi

      # 出力一覧を OS ごとに
      - name: List build output (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath dist -Recurse -Force -ErrorAction SilentlyContinue
          if (!(Test-Path -LiteralPath dist)) { Write-Host "dist directory not found" }

      - name: List build output (*nix)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          ls -lahR dist || echo "dist directory not found"

      # アップロードは dist を継続利用
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PhotoGeoView-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: error
